name: Update stop takayasu data

on:
  schedule:
    # 15:50 JST on weekdays.
    - cron: "50 6 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Fetch data
        run: python fetch_stop_takayasu.py
      - name: Commit and push
        run: |
          set -e
          DATE=$(date +%F)
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add history output docs/data
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Add stop takayasu data for ${DATE}"
            git push
          fi
